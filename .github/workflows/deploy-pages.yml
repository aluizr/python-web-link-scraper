name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', { owner, repo });
              core.info('GitHub Pages is already enabled for this repository.');
            } catch (error) {
              if (error.status === 404) {
                core.info('GitHub Pages is not enabled yet. Creating Pages site with workflow build type...');
                await github.request('POST /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  build_type: 'workflow',
                });
                core.info('GitHub Pages site created successfully.');
              } else {
                throw error;
              }
            }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate quality gates
        run: |
          npm run lint
          npm run test

      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Add SPA fallback page
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
