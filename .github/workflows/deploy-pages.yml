name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate quality gates
        run: |
          npm run lint
          npm run test

      - name: Validate required build secrets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_PUBLISHABLE_KEY" ]; then
            echo "Missing required GitHub secrets for build."
            echo "Expected (Repository or Environment github-pages): VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY"
            echo "Go to: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Secrets sanity check (masked)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          echo "VITE_SUPABASE_URL set: yes"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY set: yes"
          if ! echo "$VITE_SUPABASE_URL" | grep -Eq '^https://.+\.supabase\.co$'; then
            echo "VITE_SUPABASE_URL format seems invalid (expected https://<project>.supabase.co)"
            exit 1
          fi

      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_FALLBACK_KEY: ${{ secrets.VITE_SUPABASE_FALLBACK_KEY }}
        run: npm run build

      - name: Add SPA fallback page
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
