name: Sprint Dia 2 - UX Drag and Drop
description: Execucao do Dia 2 com foco em previsibilidade e feedback visual do drag and drop
title: "[Sprint D2] Refinar UX de drag and drop"
labels: [sprint, frontend, p1, ux]
body:
  - type: markdown
    attributes:
      value: |
        Objetivo: refinar feedback visual e previsibilidade do drag and drop entre views.

  - type: checkboxes
    id: scope
    attributes:
      label: Escopo
      options:
        - label: Melhorar highlight de alvo de drop
        - label: Ajustar fallback ao soltar item
        - label: Garantir consistencia entre list/cards/board
        - label: Validar comportamento em mobile

  - type: dropdown
    id: estado
    attributes:
      label: Estado atual
      options:
        - todo
        - doing
        - blocked
        - done
    validations:
      required: true

  - type: input
    id: progresso
    attributes:
      label: Progresso (%)
      placeholder: e.g. 0
    validations:
      required: true

  - type: input
    id: ultima_atualizacao
    attributes:
      label: Ultima atualizacao
      placeholder: YYYY-MM-DD

  - type: checkboxes
    id: blockers
    attributes:
      label: Blockers
      options:
        - label: Sem blockers

  - type: textarea
    id: detalhes_blockers
    attributes:
      label: Detalhes dos blockers

  - type: textarea
    id: evidencias
    attributes:
      label: Evidencias
      description: Before/after visual, GIF/video do fluxo e links de PR/commit

  - type: checkboxes
    id: criterios
    attributes:
      label: Criterios de aceite
      options:
        - label: Reorder previsivel em cenarios comuns
        - label: Sem salto visual inesperado
        - label: Interacao valida em desktop e mobile

  - type: checkboxes
    id: pronto
    attributes:
      label: Definicao de pronto
      options:
        - label: UX aprovada em revisao
        - label: Sem regressao funcional
        - label: Checklist de teste atualizado
